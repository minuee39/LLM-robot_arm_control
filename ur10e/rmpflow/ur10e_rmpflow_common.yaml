joint_limit_buffers: [.03, .03, .03, .03, .03, .03]

rmp_params:
    cspace_target_rmp:
        metric_scalar: 30.
        position_gain: 80.
        damping_gain: 55.
        robust_position_term_thresh: .5
        inertia: 1.

    cspace_trajectory_rmp:
        p_gain: 80.
        d_gain: 20.
        ff_gain: .25
        weight: 30.

    cspace_affine_rmp:
        final_handover_time_std_dev: .35
        weight: 1000.

    joint_limit_rmp:
        metric_scalar: 1000.
        metric_length_scale: .03
        metric_exploder_eps: 1e-3
        metric_velocity_gate_length_scale: .03
        accel_damper_gain: 150.
        accel_potential_gain: 1.
        accel_potential_exploder_length_scale: .15
        accel_potential_exploder_eps: 1e-2

    joint_velocity_cap_rmp:
        max_velocity: 1.8
        velocity_damping_region: .5
        damping_gain: 300.
        metric_weight: 50.

    target_rmp:
        accel_p_gain: 45.
        accel_d_gain: 65.
        accel_norm_eps: .10
        metric_alpha_length_scale: .08
        min_metric_alpha: .01
        max_metric_scalar: 5000.
        min_metric_scalar: 1000.
        proximity_metric_boost_scalar: 5.
        proximity_metric_boost_length_scale: .04
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false

    axis_target_rmp:
        accel_p_gain: 100.
        accel_d_gain: 70.
        metric_scalar: 5.
        proximity_metric_boost_scalar: 500.
        proximity_metric_boost_length_scale: .10
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false

    collision_rmp:
        damping_gain: 60.
        damping_std_dev: .06
        damping_robustness_eps: 1e-2
        damping_velocity_gate_length_scale: .02
        repulsion_gain: 400.
        repulsion_std_dev: .02
        metric_modulation_radius: .35
        metric_scalar: 5000.
        metric_exploder_std_dev: .04
        metric_exploder_eps: .003

    damping_rmp:
        accel_d_gain: 40.
        metric_scalar: 70.
        inertia: 100.

canonical_resolve:
    max_acceleration_norm: 80.
    projection_tolerance: .01
    verbose: false
body_cylinders:
    - name: base
      pt1: [0,0,.10]
      pt2: [0,0,0.]
      radius: .2
body_collision_controllers:
    - name: ee_link_robotiq_arg2f_base_link
      radius: .05